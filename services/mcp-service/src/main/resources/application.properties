spring.application.name=mcp-service
server.port=9300
server.address=0.0.0.0
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.health.circuitbreakers.enabled=true
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
management.metrics.tags.application=${spring.application.name}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:3s}

spring.boot.admin.client.enabled=true
spring.boot.admin.client.url=${MONITOR_SERVICE_URL:http://127.0.0.1:9100}
spring.boot.admin.client.instance.name=${spring.application.name}
spring.boot.admin.client.instance.service-base-url=${MCP_SERVICE_BASE_URL:http://127.0.0.1:9300}
spring.boot.admin.client.instance.management-base-url=${MCP_SERVICE_BASE_URL:http://127.0.0.1:9300}
spring.boot.admin.client.auto-registration=true

spring.ai.mcp.server.name=cloud-demo-mcp
spring.ai.mcp.server.version=0.0.1-SNAPSHOT
spring.ai.mcp.server.instructions=Tools for browsing campus volunteer activities and announcements, checking registrations, and managing activity or announcement content through the existing cloud-demo gateway APIs.
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false
spring.ai.mcp.server.capabilities.completion=false
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

cloud.demo.api.base-url=${CLOUD_DEMO_API_BASE_URL:http://127.0.0.1:9000}
cloud.demo.api.connect-timeout=${CLOUD_DEMO_API_CONNECT_TIMEOUT:5s}
cloud.demo.api.read-timeout=${CLOUD_DEMO_API_READ_TIMEOUT:40s}
cloud.demo.jwt.secret=${CLOUD_DEMO_JWT_SECRET:volunteerPlatformSecretKey2024ForJWTTokenGeneration}
cloud.demo.mcp.authorization-code-prefix=${CLOUD_DEMO_MCP_AUTH_CODE_PREFIX:mcp:authorization-code:}

resilience4j.retry.instances.gatewayClient.max-attempts=${CLOUD_DEMO_API_MAX_ATTEMPTS:1}
resilience4j.retry.instances.gatewayClient.wait-duration=300ms
resilience4j.retry.instances.gatewayClient.enable-exponential-backoff=true
resilience4j.retry.instances.gatewayClient.exponential-backoff-multiplier=2
resilience4j.retry.instances.gatewayClient.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException,java.lang.IllegalStateException

resilience4j.circuitbreaker.instances.gatewayClient.register-health-indicator=true
resilience4j.circuitbreaker.instances.gatewayClient.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.gatewayClient.sliding-window-size=20
resilience4j.circuitbreaker.instances.gatewayClient.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.gatewayClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gatewayClient.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.gatewayClient.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.gatewayClient.slow-call-duration-threshold=${CLOUD_DEMO_API_SLOW_CALL_THRESHOLD:30s}
resilience4j.circuitbreaker.instances.gatewayClient.slow-call-rate-threshold=50

resilience4j.bulkhead.instances.gatewayClient.max-concurrent-calls=30
resilience4j.bulkhead.instances.gatewayClient.max-wait-duration=0

logging.file.name=${APP_LOG_FILE:../../mcp-service/logs/debug.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-mcp-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-mcp-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.example=INFO
logging.level.org.example.mcp=INFO
