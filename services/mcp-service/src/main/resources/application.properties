spring.application.name=mcp-service
server.port=9300
server.address=0.0.0.0
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

spring.boot.admin.client.enabled=true
spring.boot.admin.client.url=${MONITOR_SERVICE_URL:http://127.0.0.1:9100}
spring.boot.admin.client.instance.name=${spring.application.name}
spring.boot.admin.client.instance.service-base-url=${MCP_SERVICE_BASE_URL:http://127.0.0.1:9300}
spring.boot.admin.client.instance.management-base-url=${MCP_SERVICE_BASE_URL:http://127.0.0.1:9300}
spring.boot.admin.client.auto-registration=true

spring.ai.mcp.server.name=cloud-demo-mcp
spring.ai.mcp.server.version=0.0.1-SNAPSHOT
spring.ai.mcp.server.instructions=Tools for browsing campus volunteer activities, checking registrations, and generating activity copy through the existing cloud-demo gateway APIs.
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false
spring.ai.mcp.server.capabilities.completion=false
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

cloud.demo.api.base-url=${CLOUD_DEMO_API_BASE_URL:http://127.0.0.1:9000}
cloud.demo.api.connect-timeout=${CLOUD_DEMO_API_CONNECT_TIMEOUT:5s}
cloud.demo.api.read-timeout=${CLOUD_DEMO_API_READ_TIMEOUT:10s}
cloud.demo.jwt.secret=${CLOUD_DEMO_JWT_SECRET:volunteerPlatformSecretKey2024ForJWTTokenGeneration}

logging.file.name=${APP_LOG_FILE:../../mcp-service/logs/debug.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.example=INFO
logging.level.org.example.mcp=INFO
