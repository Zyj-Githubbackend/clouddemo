spring.application.name=monitor-service
server.port=9100
server.address=0.0.0.0
server.forward-headers-strategy=framework

# Nacos 注册中心
spring.cloud.nacos.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.fail-fast=false

# Spring Boot Admin（ui.title 使用 Unicode 转义，避免 properties 中文在部分环境下被误读导致页面标题乱码）
spring.boot.admin.discovery.enabled=true
spring.boot.admin.discovery.ignored-services=
spring.boot.admin.ui.title=\u6821\u56ed\u5fd7\u613f\u670d\u52a1\u5e73\u53f0\u76d1\u63a7\u4e2d\u5fc3

# 监控端点配置
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
