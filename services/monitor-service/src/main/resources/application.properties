spring.application.name=${MONITOR_NAME:monitor-service}
server.port=9100
server.address=0.0.0.0
server.forward-headers-strategy=framework

# Nacos 注册中心
spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.fail-fast=false

# Spring Boot Admin（ui.title 使用 Unicode 转义，避免 properties 中文在部分环境下被误读导致页面标题乱码）
spring.boot.admin.discovery.enabled=true
spring.boot.admin.discovery.ignored-services=
spring.boot.admin.ui.title=\u6821\u56ed\u5fd7\u613f\u670d\u52a1\u5e73\u53f0\u76d1\u63a7\u4e2d\u5fc3

# 监控端点配置
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
management.metrics.tags.application=${spring.application.name}

logging.file.name=${APP_LOG_FILE:../../monitor-service/logs/debug.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-monitor-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-monitor-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.example=INFO
logging.level.com.alibaba.nacos=WARN
