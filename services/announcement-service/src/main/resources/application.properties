spring.application.name=announcement-service
server.port=8300
server.address=0.0.0.0

spring.cloud.nacos.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.fail-fast=false

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/volunteer_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123888

mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=org.example.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9005}
minio.access-key=${MINIO_ACCESS_KEY:root}
minio.secret-key=${MINIO_SECRET_KEY:12345678}
minio.bucket=${MINIO_BUCKET:activity-images}
minio.public-base-url=${MINIO_PUBLIC_BASE_URL:/api}
minio.max-file-size-mb=${MINIO_MAX_FILE_SIZE_MB:5}

logging.file.name=${APP_LOG_FILE:../../announcement-service/logs/debug.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.example=INFO
logging.level.com.alibaba.nacos=WARN
