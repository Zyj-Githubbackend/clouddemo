spring.application.name=${GATEWAY_NAME:gateway-service}
server.port=9000
server.address=0.0.0.0

# Gateway outbound timeout
spring.cloud.gateway.httpclient.connect-timeout=${GATEWAY_CONNECT_TIMEOUT_MS:3000}
spring.cloud.gateway.httpclient.response-timeout=${GATEWAY_RESPONSE_TIMEOUT:6s}

# Redis for gateway rate limiter
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:3s}
spring.cloud.gateway.filter.request-rate-limiter.deny-empty-key=false

# Nacos 注册中心
spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.fail-fast=false

# Gateway路由配置
# 用户服务路由
spring.cloud.gateway.routes[0].id=${USER_SERVICE_NAME:user-service}-route
spring.cloud.gateway.routes[0].uri=lb://${USER_SERVICE_NAME:user-service}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/user/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[0].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.replenishRate=${GATEWAY_USER_REPLENISH_RATE:20}
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.burstCapacity=${GATEWAY_USER_BURST_CAPACITY:40}
spring.cloud.gateway.routes[0].filters[1].args.key-resolver=#{@ipOrUserKeyResolver}
spring.cloud.gateway.routes[0].filters[2]=CircuitBreaker=name=userServiceCircuitBreaker,fallbackUri=forward:/fallback/user

# 活动服务路由
spring.cloud.gateway.routes[1].id=${ACTIVITY_SERVICE_NAME:activity-service}-route
spring.cloud.gateway.routes[1].uri=lb://${ACTIVITY_SERVICE_NAME:activity-service}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/activity/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.replenishRate=${GATEWAY_ACTIVITY_REPLENISH_RATE:40}
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=${GATEWAY_ACTIVITY_BURST_CAPACITY:80}
spring.cloud.gateway.routes[1].filters[1].args.key-resolver=#{@ipOrUserKeyResolver}
spring.cloud.gateway.routes[1].filters[2]=CircuitBreaker=name=activityServiceCircuitBreaker,fallbackUri=forward:/fallback/activity

spring.cloud.gateway.routes[2].id=${ANNOUNCEMENT_SERVICE_NAME:announcement-service}-route
spring.cloud.gateway.routes[2].uri=lb://${ANNOUNCEMENT_SERVICE_NAME:announcement-service}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/announcement/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[2].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[2].filters[1].args.redis-rate-limiter.replenishRate=${GATEWAY_ANNOUNCEMENT_REPLENISH_RATE:40}
spring.cloud.gateway.routes[2].filters[1].args.redis-rate-limiter.burstCapacity=${GATEWAY_ANNOUNCEMENT_BURST_CAPACITY:80}
spring.cloud.gateway.routes[2].filters[1].args.key-resolver=#{@ipOrUserKeyResolver}
spring.cloud.gateway.routes[2].filters[2]=CircuitBreaker=name=announcementServiceCircuitBreaker,fallbackUri=forward:/fallback/announcement

spring.cloud.gateway.routes[3].id=${FEEDBACK_SERVICE_NAME:feedback-service}-route
spring.cloud.gateway.routes[3].uri=lb://${FEEDBACK_SERVICE_NAME:feedback-service}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/feedback/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}
spring.cloud.gateway.routes[3].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[3].filters[1].args.redis-rate-limiter.replenishRate=${GATEWAY_FEEDBACK_REPLENISH_RATE:20}
spring.cloud.gateway.routes[3].filters[1].args.redis-rate-limiter.burstCapacity=${GATEWAY_FEEDBACK_BURST_CAPACITY:40}
spring.cloud.gateway.routes[3].filters[1].args.key-resolver=#{@ipOrUserKeyResolver}
spring.cloud.gateway.routes[3].filters[2]=CircuitBreaker=name=feedbackServiceCircuitBreaker,fallbackUri=forward:/fallback/feedback

# 跨域配置
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
management.metrics.tags.application=${spring.application.name}
management.health.circuitbreakers.enabled=true

# Resilience4j settings for gateway route circuit breakers
resilience4j.circuitbreaker.configs.gatewayDefault.register-health-indicator=true
resilience4j.circuitbreaker.configs.gatewayDefault.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.gatewayDefault.sliding-window-size=20
resilience4j.circuitbreaker.configs.gatewayDefault.minimum-number-of-calls=10
resilience4j.circuitbreaker.configs.gatewayDefault.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.gatewayDefault.slow-call-duration-threshold=4s
resilience4j.circuitbreaker.configs.gatewayDefault.slow-call-rate-threshold=50
resilience4j.circuitbreaker.configs.gatewayDefault.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.gatewayDefault.permitted-number-of-calls-in-half-open-state=5

resilience4j.timelimiter.configs.gatewayDefault.timeout-duration=${GATEWAY_RESPONSE_TIMEOUT:6s}
resilience4j.timelimiter.configs.gatewayDefault.cancel-running-future=true

resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.base-config=gatewayDefault
resilience4j.circuitbreaker.instances.activityServiceCircuitBreaker.base-config=gatewayDefault
resilience4j.circuitbreaker.instances.announcementServiceCircuitBreaker.base-config=gatewayDefault
resilience4j.circuitbreaker.instances.feedbackServiceCircuitBreaker.base-config=gatewayDefault

resilience4j.timelimiter.instances.userServiceCircuitBreaker.base-config=gatewayDefault
resilience4j.timelimiter.instances.activityServiceCircuitBreaker.base-config=gatewayDefault
resilience4j.timelimiter.instances.announcementServiceCircuitBreaker.base-config=gatewayDefault
resilience4j.timelimiter.instances.feedbackServiceCircuitBreaker.base-config=gatewayDefault

# JWT配置
jwt.secret=volunteerPlatformSecretKey2024
jwt.expiration=86400000

logging.file.name=${APP_LOG_FILE:../../gateway-service/logs/debug.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-gateway-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-gateway-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.example=INFO
logging.level.com.alibaba.nacos=WARN
