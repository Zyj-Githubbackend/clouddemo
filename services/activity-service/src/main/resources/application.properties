spring.application.name=${ACTIVITY_SERVICE_NAME:activity-service}
server.port=8200
server.address=0.0.0.0
user.service.name=${USER_SERVICE_NAME:user-service}
user.service.connect-timeout=${USER_SERVICE_CONNECT_TIMEOUT:2s}
user.service.read-timeout=${USER_SERVICE_READ_TIMEOUT:3s}

# Nacos 注册中心（server-addr 与 discovery 同时配置，避免部分环境下地址未绑定为 null）
spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
# Nacos gRPC 尚未就绪时不阻塞整个应用启动；连通后会注册（生产需强校验可改为 true）
spring.cloud.nacos.discovery.fail-fast=false

# MySQL数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/activity_service_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:activity_service}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123888}

# MyBatis-Plus配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=org.example.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# Redis配置（用于防超卖）
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.database=0
spring.data.redis.timeout=5000

spring.rabbitmq.host=${RABBITMQ_HOST:127.0.0.1}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# AI API 配置（智能生成活动文案）— DeepSeek OpenAI 兼容接口
# 文档：https://api-docs.deepseek.com/zh-cn/
# 完整 URL 需包含 /v1/chat/completions；模型：deepseek-chat（默认）或 deepseek-reasoner（思考模式）
ai.api.url=https://api.deepseek.com/v1/chat/completions
# 推荐环境变量 DEEPSEEK_API_KEY，避免密钥进仓库；未设置或为空时使用本地兜底文案
ai.api.key=${DEEPSEEK_API_KEY:}
ai.api.model=deepseek-chat
ai.api.connect-timeout=${AI_API_CONNECT_TIMEOUT:5s}
ai.api.read-timeout=${AI_API_READ_TIMEOUT:25s}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
management.metrics.tags.application=${spring.application.name}
management.health.circuitbreakers.enabled=true

resilience4j.retry.instances.aiGenerator.max-attempts=${AI_GENERATOR_MAX_ATTEMPTS:1}
resilience4j.retry.instances.aiGenerator.wait-duration=500ms
resilience4j.retry.instances.aiGenerator.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException,java.lang.IllegalStateException

resilience4j.circuitbreaker.instances.aiGenerator.register-health-indicator=true
resilience4j.circuitbreaker.instances.aiGenerator.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.aiGenerator.sliding-window-size=10
resilience4j.circuitbreaker.instances.aiGenerator.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.aiGenerator.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aiGenerator.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.aiGenerator.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.aiGenerator.slow-call-duration-threshold=${AI_GENERATOR_SLOW_CALL_THRESHOLD:24s}
resilience4j.circuitbreaker.instances.aiGenerator.slow-call-rate-threshold=50

resilience4j.bulkhead.instances.aiGenerator.max-concurrent-calls=10
resilience4j.bulkhead.instances.aiGenerator.max-wait-duration=0

resilience4j.retry.instances.userServiceClient.max-attempts=2
resilience4j.retry.instances.userServiceClient.wait-duration=200ms
resilience4j.retry.instances.userServiceClient.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException,java.lang.IllegalStateException,org.example.common.exception.BusinessException

resilience4j.circuitbreaker.instances.userServiceClient.register-health-indicator=true
resilience4j.circuitbreaker.instances.userServiceClient.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.userServiceClient.sliding-window-size=20
resilience4j.circuitbreaker.instances.userServiceClient.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.userServiceClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userServiceClient.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.userServiceClient.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.userServiceClient.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.userServiceClient.slow-call-rate-threshold=50

resilience4j.ratelimiter.instances.userServiceClient.limit-for-period=${USER_SERVICE_CLIENT_LIMIT_FOR_PERIOD:100}
resilience4j.ratelimiter.instances.userServiceClient.limit-refresh-period=${USER_SERVICE_CLIENT_LIMIT_REFRESH_PERIOD:1s}
resilience4j.ratelimiter.instances.userServiceClient.timeout-duration=${USER_SERVICE_CLIENT_RATE_LIMIT_TIMEOUT:0s}

resilience4j.bulkhead.instances.userServiceClient.max-concurrent-calls=${USER_SERVICE_CLIENT_BULKHEAD_MAX_CONCURRENT_CALLS:30}
resilience4j.bulkhead.instances.userServiceClient.max-wait-duration=${USER_SERVICE_CLIENT_BULKHEAD_MAX_WAIT_DURATION:0}

# MinIO image storage
minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9005}
minio.access-key=${MINIO_ACCESS_KEY:root}
minio.secret-key=${MINIO_SECRET_KEY:12345678}
minio.bucket=${MINIO_BUCKET:activity-images}
minio.public-base-url=${MINIO_PUBLIC_BASE_URL:/api}
minio.max-file-size-mb=${MINIO_MAX_FILE_SIZE_MB:5}

logging.file.name=${APP_LOG_FILE:../../activity-service/logs/debug.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-activity-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-activity-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.example=INFO
logging.level.com.alibaba.nacos=WARN
