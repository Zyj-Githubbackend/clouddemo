spring.application.name=${USER_SERVICE_NAME:user-service}
server.port=8100
server.address=0.0.0.0

# Nacos 注册中心
spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.fail-fast=false

# MySQL数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/user_service_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user_service}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123888}

spring.rabbitmq.host=${RABBITMQ_HOST:127.0.0.1}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# MyBatis-Plus配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=org.example.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT配置
jwt.secret=${JWT_SECRET:volunteerPlatformSecretKey2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
management.metrics.tags.application=${spring.application.name}

logging.file.name=${APP_LOG_FILE:../../user-service/logs/debug.log}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-user-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} stackId=%X{stackId:-single} serviceName=%X{serviceName:-user-service} eventType=%X{eventType:-app.log} messageId=%X{messageId:-none} traceId=%X{traceId:-none} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=15
logging.logback.rollingpolicy.total-size-cap=1GB
logging.level.root=INFO
logging.level.org.example=INFO
logging.level.com.alibaba.nacos=WARN
