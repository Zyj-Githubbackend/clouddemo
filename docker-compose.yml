services:
  mysql:
    image: ${MYSQL_IMAGE:-public.ecr.aws/docker/library/mysql:8.0}
    container_name: cloud-demo-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: 123888
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - cloud-demo

  redis:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    container_name: cloud-demo-redis
    restart: unless-stopped
    networks:
      - cloud-demo

  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v2.4.2}
    container_name: cloud-demo-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8849:8848"
    networks:
      - cloud-demo

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:latest}
    container_name: cloud-demo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-12345678}
    ports:
      - "9007:9000"
      - "9008:9001"
    volumes:
      - minio-data:/data
    networks:
      - cloud-demo

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-public.ecr.aws/docker/library/maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-public.ecr.aws/docker/library/eclipse-temurin:17-jre}
    container_name: cloud-demo-user-service
    restart: unless-stopped
    depends_on:
      - mysql
      - nacos
    environment:
      APP_LOG_FILE: /app/logs/debug.log
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/volunteer_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123888
      JWT_SECRET: volunteerPlatformSecretKey2024
      JWT_EXPIRATION: 86400000
    volumes:
      - ./user-service/logs:/app/logs
    networks:
      - cloud-demo

  activity-service:
    build:
      context: .
      dockerfile: services/activity-service/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-public.ecr.aws/docker/library/maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-public.ecr.aws/docker/library/eclipse-temurin:17-jre}
    container_name: cloud-demo-activity-service
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - nacos
      - minio
    environment:
      APP_LOG_FILE: /app/logs/debug.log
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/volunteer_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123888
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AI_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-root}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-12345678}
      MINIO_BUCKET: ${MINIO_BUCKET:-activity-images}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-/api}
    volumes:
      - ./activity-service/logs:/app/logs
    networks:
      - cloud-demo

  announcement-service:
    build:
      context: .
      dockerfile: services/announcement-service/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-public.ecr.aws/docker/library/maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-public.ecr.aws/docker/library/eclipse-temurin:17-jre}
    container_name: cloud-demo-announcement-service
    restart: unless-stopped
    depends_on:
      - mysql
      - nacos
      - minio
    environment:
      APP_LOG_FILE: /app/logs/debug.log
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/volunteer_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123888
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-root}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-12345678}
      MINIO_BUCKET: ${MINIO_BUCKET:-activity-images}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-/api}
    volumes:
      - ./announcement-service/logs:/app/logs
    networks:
      - cloud-demo

  feedback-service:
    build:
      context: .
      dockerfile: services/feedback-service/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-public.ecr.aws/docker/library/maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-public.ecr.aws/docker/library/eclipse-temurin:17-jre}
    container_name: cloud-demo-feedback-service
    restart: unless-stopped
    depends_on:
      - mysql
      - nacos
      - minio
    environment:
      APP_LOG_FILE: /app/logs/debug.log
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/volunteer_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123888
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-root}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-12345678}
      MINIO_BUCKET: ${MINIO_BUCKET:-activity-images}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-/api}
    volumes:
      - ./feedback-service/logs:/app/logs
    networks:
      - cloud-demo

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-public.ecr.aws/docker/library/maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-public.ecr.aws/docker/library/eclipse-temurin:17-jre}
    container_name: cloud-demo-gateway-service
    restart: unless-stopped
    depends_on:
      - nacos
      - user-service
      - activity-service
      - announcement-service
      - feedback-service
    environment:
      APP_LOG_FILE: /app/logs/debug.log
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      JWT_SECRET: volunteerPlatformSecretKey2024
      JWT_EXPIRATION: 86400000
    volumes:
      - ./gateway-service/logs:/app/logs
    ports:
      - "9001:9000"
    networks:
      - cloud-demo

  monitor-service:
    build:
      context: .
      dockerfile: services/monitor-service/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-public.ecr.aws/docker/library/maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-public.ecr.aws/docker/library/eclipse-temurin:17-jre}
    container_name: cloud-demo-monitor-service
    restart: unless-stopped
    depends_on:
      - nacos
    environment:
      APP_LOG_FILE: /app/logs/debug.log
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    volumes:
      - ./monitor-service/logs:/app/logs
    ports:
      - "9101:9100"
    networks:
      - cloud-demo

  mcp-service:
    build:
      context: .
      dockerfile: services/mcp-service/Dockerfile
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-public.ecr.aws/docker/library/maven:3.9.9-eclipse-temurin-17}
        RUNTIME_IMAGE: ${JAVA_RUNTIME_IMAGE:-public.ecr.aws/docker/library/eclipse-temurin:17-jre}
    container_name: cloud-demo-mcp-service
    restart: unless-stopped
    depends_on:
      - gateway-service
    environment:
      APP_LOG_FILE: /app/logs/debug.log
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      CLOUD_DEMO_API_BASE_URL: http://gateway-service:9000
      MONITOR_SERVICE_URL: http://monitor-service:9100
      MCP_SERVICE_BASE_URL: http://mcp-service:9300
    volumes:
      - ./mcp-service/logs:/app/logs
    networks:
      - cloud-demo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-public.ecr.aws/docker/library/node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-public.ecr.aws/docker/library/nginx:1.27-alpine}
    container_name: cloud-demo-frontend
    restart: unless-stopped
    depends_on:
      - gateway-service
      - monitor-service
      - mcp-service
      - announcement-service
      - feedback-service
    ports:
      - "8081:80"
    networks:
      - cloud-demo

networks:
  cloud-demo:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
