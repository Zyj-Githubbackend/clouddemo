global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: cloud-demo-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway-service:9000
          - user-service:8100
          - activity-service:8200
          - announcement-service:8300
          - feedback-service:8400
          - monitor-service:9100
          - mcp-service:9300
