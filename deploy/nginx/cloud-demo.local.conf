upstream cloud_demo_gateway {
    server 127.0.0.1:9000;
    keepalive 32;
}

upstream cloud_demo_monitor {
    server 127.0.0.1:9100;
    keepalive 16;
}

upstream cloud_demo_mcp {
    server 127.0.0.1:9300;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Frontend build output on this machine
    root D:/clouddemo/cloud-demo/frontend/dist;
    index index.html;
    charset utf-8;

    access_log logs/cloud-demo.access.log;
    error_log logs/cloud-demo.error.log warn;

    client_max_body_size 10m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Frontend calls /api/user/** and /api/activity/**.
    # nginx removes the /api prefix here, then forwards to gateway-service on port 9000.
    location ^~ /api/ {
        proxy_pass http://cloud_demo_gateway/;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /monitor {
        return 302 /monitor/;
    }

    location ^~ /.well-known/ {
        proxy_pass http://cloud_demo_mcp;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /authorize {
        proxy_pass http://cloud_demo_mcp;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /token {
        proxy_pass http://cloud_demo_mcp;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /register {
        proxy_pass http://cloud_demo_mcp;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /mcp {
        proxy_pass http://cloud_demo_mcp/mcp;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /mcp/ {
        proxy_pass http://cloud_demo_mcp;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Spring Boot Admin monitor center
    location ^~ /monitor/ {
        proxy_pass http://cloud_demo_monitor/;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /monitor;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff2?|ttf)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }
}
