apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-demo-edge
  namespace: cloud-demo
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
spec:
  ingressClassName: nginx
  rules:
    - host: cloud-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edge-nginx
                port:
                  number: 80
