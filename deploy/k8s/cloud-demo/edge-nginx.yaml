apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-nginx-config
  namespace: cloud-demo
data:
  default.conf: |
    upstream gateway_service {
      server gateway-service:9000;
      keepalive 64;
    }

    upstream monitor_service {
      server monitor-service:9100;
      keepalive 32;
    }

    upstream mcp_service {
      server mcp-service:9300;
      keepalive 32;
    }

    upstream grafana_service {
      server grafana.observability.svc.cluster.local:3000;
      keepalive 16;
    }

    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
      }

      location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      location ^~ /api/ {
        proxy_pass http://gateway_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }

      location = /monitor {
        return 302 /monitor/;
      }

      location ^~ /monitor/ {
        rewrite ^/monitor/(.*)$ /$1 break;
        proxy_pass http://monitor_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /monitor;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }

      location = /grafana {
        return 302 /grafana/;
      }

      location ^~ /grafana/ {
        rewrite ^/grafana/(.*)$ /$1 break;
        proxy_pass http://grafana_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /grafana;
      }

      location ^~ /.well-known/ {
        proxy_pass http://mcp_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
      }

      location = /authorize {
        proxy_pass http://mcp_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
      }

      location = /token {
        proxy_pass http://mcp_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
      }

      location = /register {
        proxy_pass http://mcp_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
      }

      location = /mcp {
        proxy_pass http://mcp_service/mcp;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
      }

      location ^~ /mcp/ {
        proxy_pass http://mcp_service;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
      }

      location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff2?|ttf)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: edge-nginx
  namespace: cloud-demo
  labels:
    app: edge-nginx
spec:
  selector:
    app: edge-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-nginx
  namespace: cloud-demo
  labels:
    app: edge-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edge-nginx
  template:
    metadata:
      labels:
        app: edge-nginx
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: edge-nginx
      containers:
        - name: edge-nginx
          image: cloud-demo/edge-nginx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: edge-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: edge-nginx-config
          configMap:
            name: edge-nginx-config
