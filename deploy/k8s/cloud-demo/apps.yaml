apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: cloud-demo
  labels:
    app: gateway-service
spec:
  selector:
    app: gateway-service
  ports:
    - name: http
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: cloud-demo
  labels:
    app: gateway-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "9000"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gateway-service
      containers:
        - name: gateway-service
          image: cloud-demo/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              name: http
          envFrom:
            - configMapRef:
                name: cloud-demo-shared-config
          env:
            - name: APP_LOG_FILE
              value: /app/logs/debug.log
            - name: JAVA_TOOL_OPTIONS
              value: -Duser.timezone=Asia/Shanghai
            - name: SERVICE_NAME
              value: gateway-service
            - name: SPRING_APPLICATION_NAME
              value: gateway-service
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloud-demo-secret
                  key: JWT_SECRET
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-demo-secret
                  key: SPRING_DATA_REDIS_PASSWORD
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
---
